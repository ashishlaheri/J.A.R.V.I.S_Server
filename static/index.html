<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="J.A.R.V.I.S. — Personal AI Assistant by Ashish Laheri">
    <meta name="theme-color" content="#060a12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JARVIS">
    <meta name="mobile-web-app-capable" content="yes">
    <title>J.A.R.V.I.S.</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='none' stroke='%2300d4ff' stroke-width='3'/><circle cx='50' cy='50' r='15' fill='%2300d4ff' opacity='0.8'/></svg>">
    <!-- iOS splash screens -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23060a12'/><circle cx='90' cy='90' r='50' fill='none' stroke='%2300d4ff' stroke-width='4'/><circle cx='90' cy='90' r='20' fill='%2300d4ff' opacity='0.8'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ═══ PARTICLES CANVAS (background) ═══ -->
    <canvas id="particle-canvas"></canvas>

    <!-- ═══ HUD OVERLAY EFFECTS ═══ -->
    <div class="hud-scanlines"></div>
    <div class="hud-vignette"></div>

    <!-- ═══ LOGIN SCREEN ═══ -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-arc-reactor">
                <div class="arc-ring arc-ring-1"></div>
                <div class="arc-ring arc-ring-2"></div>
                <div class="arc-ring arc-ring-3"></div>
                <div class="arc-core">
                    <div class="arc-core-inner"></div>
                </div>
                <div class="arc-particles">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                </div>
            </div>
            <h1 class="login-title">J.A.R.V.I.S.</h1>
            <p class="login-subtitle">Just A Rather Very Intelligent System</p>
            <div class="login-form">
                <div class="input-wrapper">
                    <input type="password" id="password-input" placeholder="Enter access code" autocomplete="off">
                    <div class="input-glow"></div>
                </div>
                <button id="login-btn">
                    <span class="btn-text">INITIALIZE</span>
                    <span class="btn-glow"></span>
                </button>
            </div>
            <p id="login-error" class="login-error"></p>
            <p class="login-version">v3.1 · Ashish Laheri</p>
        </div>
    </div>

    <!-- ═══ MAIN HUD ═══ -->
    <div id="main-screen" class="screen">
        <!-- Status Bar -->
        <header class="status-bar">
            <div class="status-left">
                <span class="status-indicator" id="connection-status"></span>
                <span class="status-text">J.A.R.V.I.S.</span>
                <span class="status-version">v3.1</span>
            </div>
            <div class="status-center">
                <span id="response-time" class="response-time"></span>
            </div>
            <div class="status-right">
                <span id="clock"></span>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-area" class="chat-area">
            <!-- Messages will be injected here -->
        </div>

        <!-- Central Orb -->
        <div class="orb-container">
            <div id="jarvis-orb" class="jarvis-orb" title="Tap to speak">
                <div class="orb-ring orb-ring-outer"></div>
                <div class="orb-ring orb-ring-middle"></div>
                <div class="orb-ring orb-ring-inner"></div>
                <div class="orb-ring orb-ring-pulse"></div>
                <div class="orb-core">
                    <svg id="mic-icon" class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
                <div class="orb-energy"></div>
            </div>
            <p class="orb-label" id="orb-label">Tap to speak</p>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-btn" data-skill="briefing" id="btn-briefing" title="Daily Briefing">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <span>Briefing</span>
            </button>
            <button class="action-btn" data-skill="weather" id="btn-weather" title="Weather">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                <span>Weather</span>
            </button>
            <button class="action-btn" data-skill="news" id="btn-news" title="News">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span>News</span>
            </button>
            <button class="action-btn" data-skill="reminders" id="btn-reminders" title="Reminders">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <span>Reminders</span>
            </button>
            <!-- Security toggle button -->
            <button class="action-btn security-toggle-btn" id="btn-security-toggle" title="Security Controls">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span>Security</span>
            </button>
        </div>
        </div>

        <!-- Text Input -->
        <div class="input-bar">
            <input type="text" id="text-input" placeholder="Type a command..." autocomplete="off">
            <button id="send-btn" class="send-btn" title="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>

    <!-- ═══ SECURITY BOTTOM SHEET ═══ -->
    <div id="security-backdrop" class="security-backdrop hidden"></div>
    <div id="security-panel" class="security-panel hidden">
        <div class="security-sheet-handle"></div>
        <div class="security-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="security-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>SECURITY CONTROL</span>
            <div class="security-status-dot"></div>
        </div>
        <div class="security-grid">
            <button class="sec-btn sec-btn-blue" data-sec-cmd="screenshot_upload" id="sec-screenshot" title="See what's on screen right now">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>See Screen</span>
            </button>
            <button class="sec-btn sec-btn-yellow" data-sec-cmd="lock_now" id="sec-lock" title="Lock the PC immediately">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span>Lock Now</span>
            </button>
            <button class="sec-btn sec-btn-red" data-sec-cmd="alarm" id="sec-alarm" title="Play loud alarm on PC">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>ALARM</span>
            </button>
            <button class="sec-btn sec-btn-orange" data-sec-cmd="warning" id="sec-warning" title="Show scary warning popup on PC">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Warning</span>
            </button>
            <button class="sec-btn sec-btn-purple" data-sec-cmd="freeze" id="sec-freeze" title="Freeze keyboard and mouse for 10 seconds">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span>Freeze (10s)</span>
            </button>
            <button class="sec-btn sec-btn-red" data-sec-cmd="logoff" id="sec-logoff" title="Force log off the current user">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Log Off</span>
            </button>
            <button class="sec-btn sec-btn-gray" data-sec-cmd="disable_wifi" id="sec-wifi-off" title="Cut WiFi connection">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                <span>Cut WiFi</span>
            </button>
            <button class="sec-btn sec-btn-green" data-sec-cmd="running_apps" id="sec-running" title="See what apps are open">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span>Who's Running</span>
            </button>
        </div>
        <!-- Screenshot viewer -->
        <div id="screenshot-viewer" class="screenshot-viewer hidden">
            <div class="screenshot-header">
                <span>LIVE SCREENSHOT</span>
                <button id="close-screenshot" class="close-screenshot-btn">✕</button>
            </div>
            <img id="screenshot-img" class="screenshot-img" alt="Live PC Screenshot" />
            <p id="screenshot-time" class="screenshot-time"></p>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification-toast" class="notification-toast hidden">
        <div class="toast-icon">🔔</div>
        <div class="toast-content">
            <strong id="toast-title"></strong>
            <p id="toast-body"></p>
        </div>
    </div>

    <!-- Reconnecting Overlay -->
    <div id="reconnect-overlay" class="reconnect-overlay hidden">
        <div class="reconnect-spinner"></div>
        <p>Reconnecting to server...</p>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
