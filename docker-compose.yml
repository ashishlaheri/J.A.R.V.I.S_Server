services:
  jarvis:
    build: .
    container_name: jarvis-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - jarvis-data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  jarvis-data:
